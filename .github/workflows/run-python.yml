name: Run Wepayment Script

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: "Start Date"
        required: true
      end_date:
        description: "End Date"
        required: true
      upload_s3:
        description: "Upload to S3"
        required: true

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install boto3

      - name: Debug inputs
        run: |
          echo "Start: ${{ github.event.inputs.start_date }}"
          echo "End: ${{ github.event.inputs.end_date }}"
          echo "Upload: ${{ github.event.inputs.upload_s3 }}"

      - name: Run script
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          python Wepayment.py \
          "${{ github.event.inputs.start_date }}" \
          "${{ github.event.inputs.end_date }}" \
          "${{ github.event.inputs.upload_s3 }}"
